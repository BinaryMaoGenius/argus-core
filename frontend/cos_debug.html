<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>COS debug</title>
<!--
  COS debug UI — single-file, vanilla, no build.
  Serve from FastAPI:

    from fastapi import FastAPI, Request
    from fastapi.responses import StreamingResponse, FileResponse
    import json, time

    app = FastAPI()
    CANCEL: set[str] = set()  # replace with a real registry

    @app.get("/")
    def index():
        return FileResponse("cos_debug.html")

    @app.get("/health")
    def health():
        return {"ok": True}

    @app.post("/chat/stream")
    async def chat_stream(req: Request):
        body = await req.json()
        rid = body["request_id"]

        async def gen():
            decision = router.decide(body["message"])  # your router
            yield f"event: route\ndata: {json.dumps({'path': decision.path, 'model': decision.model, 'reason': decision.reason, 'detail': decision.detail})}\n\n"

            t0 = time.perf_counter(); ttft = None; n = 0
            async for tok in ollama_stream(decision.model, body["message"]):
                if rid in CANCEL:
                    break
                if ttft is None:
                    ttft = (time.perf_counter() - t0) * 1000
                n += 1
                yield f"event: token\ndata: {json.dumps({'text': tok})}\n\n"

            total = (time.perf_counter() - t0) * 1000
            yield f"event: done\ndata: {json.dumps({'ttft_ms': ttft, 'total_ms': total, 'token_count': n, 'finish_reason': 'cancelled' if rid in CANCEL else 'stop'})}\n\n"
            CANCEL.discard(rid)

        return StreamingResponse(
            gen(),
            media_type="text/event-stream",
            headers={"Cache-Control": "no-cache", "X-Accel-Buffering": "no"},
        )

    @app.post("/chat/cancel")
    async def cancel(req: Request):
        CANCEL.add((await req.json())["request_id"])
        return {"ok": True}

  Event contract (SSE):
    event: route  data: {path:'fast'|'slow', model, reason, detail?}
    event: token  data: {text}
    event: done   data: {ttft_ms, total_ms, token_count, finish_reason}
    event: error  data: {message}
-->
<style>
  :root {
    --bg: #0e0e10;
    --panel: #1a1a1d;
    --panel-2: #232327;
    --border: #2a2a2f;
    --fg: #e5e5e5;
    --muted: #8a8a90;
    --fast: #4ade80;
    --slow: #fb923c;
    --err: #f87171;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg); }
  body {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  header .title { font-weight: 600; letter-spacing: .04em; }
  header .status { font-size: 11px; color: var(--muted); }
  header .status .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); margin-right: 6px; vertical-align: middle;
  }
  header .status.ok .dot { background: var(--fast); }
  header .status.ko .dot { background: var(--err); }

  #log {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .msg { display: flex; flex-direction: column; gap: 4px; max-width: 100%; }
  .msg.user .body {
    align-self: flex-end;
    background: var(--panel-2);
    border: 1px solid var(--border);
    max-width: 80%;
  }
  .msg .body {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 10px 12px;
    border-radius: 6px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg .meta {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--muted);
  }
  .msg.user .meta { justify-content: flex-end; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--muted);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    font-size: 10px;
    font-weight: 600;
  }
  .badge.fast { border-color: var(--fast); color: var(--fast); }
  .badge.slow { border-color: var(--slow); color: var(--slow); }
  .badge.err  { border-color: var(--err);  color: var(--err); }
  .metrics { font-variant-numeric: tabular-nums; opacity: .8; }
  .metrics .sep { opacity: .4; margin: 0 6px; }

  #waiting {
    display: none;
    padding: 20px 16px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: #131316;
    align-items: center; gap: 20px;
  }
  #waiting.on { display: flex; }
  #waiting .counter {
    font-size: 42px;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    min-width: 120px;
  }
  #waiting .counter.warn { color: var(--slow); }
  #waiting .label { color: var(--muted); flex: 1; }
  #waiting button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 6px 12px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  #waiting button:hover { border-color: var(--err); color: var(--err); }

  footer {
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    display: flex; gap: 8px;
  }
  footer textarea {
    flex: 1;
    background: var(--panel);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 13px;
    resize: none;
    min-height: 40px;
    max-height: 160px;
    outline: none;
  }
  footer textarea:focus { border-color: #444; }
  footer button {
    background: var(--fg);
    color: var(--bg);
    border: none;
    padding: 0 16px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  footer button:disabled { opacity: .4; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <div class="title">COS debug</div>
  <div class="status" id="status"><span class="dot"></span><span id="status-text">checking…</span></div>
</header>

<div id="log"></div>

<div id="waiting">
  <div class="counter" id="counter">0.0s</div>
  <div class="label" id="wait-label">waiting first token…</div>
  <button id="cancel">Cancel</button>
</div>

<footer>
  <textarea id="input" placeholder="message… (Enter to send, Shift+Enter for newline)"></textarea>
  <button id="send">Send</button>
</footer>

<script>
(() => {
  const $log = document.getElementById('log');
  const $input = document.getElementById('input');
  const $send = document.getElementById('send');
  const $waiting = document.getElementById('waiting');
  const $counter = document.getElementById('counter');
  const $waitLabel = document.getElementById('wait-label');
  const $cancel = document.getElementById('cancel');
  const $status = document.getElementById('status');
  const $statusText = document.getElementById('status-text');

  let inflight = null; // { controller, requestId }

  // ---- backend health ping ----
  fetch('/health').then(r => {
    if (r.ok) { $status.className = 'status ok'; $statusText.textContent = 'backend up'; }
    else { $status.className = 'status ko'; $statusText.textContent = 'backend ' + r.status; }
  }).catch(() => {
    $status.className = 'status ko';
    $statusText.textContent = 'backend unreachable';
  });

  // ---- helpers ----
  const uuid = () => (crypto.randomUUID ? crypto.randomUUID()
    : Date.now().toString(36) + Math.random().toString(36).slice(2));

  const fmtMs = (ms) => (ms == null) ? '—' : (ms / 1000).toFixed(2) + 's';

  function addUserMsg(text) {
    const wrap = document.createElement('div');
    wrap.className = 'msg user';
    const body = document.createElement('div');
    body.className = 'body';
    body.textContent = text;
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = 'you';
    wrap.append(body, meta);
    $log.appendChild(wrap);
    scrollBottom();
  }

  function addAssistantMsg() {
    const wrap = document.createElement('div');
    wrap.className = 'msg assistant';
    const meta = document.createElement('div');
    meta.className = 'meta';
    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = 'routing…';
    const detail = document.createElement('span');
    detail.className = 'detail';
    meta.append(badge, detail);
    const body = document.createElement('div');
    body.className = 'body';
    body.textContent = '';
    const metrics = document.createElement('div');
    metrics.className = 'meta metrics';
    metrics.textContent = '';
    wrap.append(meta, body, metrics);
    $log.appendChild(wrap);
    scrollBottom();
    return { wrap, badge, detail, body, metrics };
  }

  function scrollBottom() {
    $log.scrollTop = $log.scrollHeight;
  }

  // ---- SSE parser over fetch ReadableStream ----
  async function* parseSSE(response) {
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf('\n\n')) !== -1) {
        const raw = buf.slice(0, idx);
        buf = buf.slice(idx + 2);
        const ev = { event: 'message', data: '' };
        for (const line of raw.split('\n')) {
          if (line.startsWith('event:')) ev.event = line.slice(6).trim();
          else if (line.startsWith('data:')) ev.data += line.slice(5).trim();
        }
        if (ev.data) yield ev;
      }
    }
  }

  // ---- send flow ----
  async function send(text) {
    if (!text.trim() || inflight) return;
    addUserMsg(text);
    const ui = addAssistantMsg();

    const controller = new AbortController();
    const requestId = uuid();
    inflight = { controller, requestId };
    $send.disabled = true;

    const t0 = performance.now();
    let ttft = null;
    let tokCount = 0;

    // waiting counter
    $waiting.classList.add('on');
    $waitLabel.textContent = 'waiting first token…';
    $counter.classList.remove('warn');
    $counter.textContent = '0.0s';
    const ticker = setInterval(() => {
      const s = (performance.now() - t0) / 1000;
      $counter.textContent = s.toFixed(1) + 's';
      if (s > 3) $counter.classList.add('warn');
    }, 100);

    const stopWaiting = () => {
      clearInterval(ticker);
      $waiting.classList.remove('on');
    };

    try {
      const res = await fetch('/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, request_id: requestId }),
        signal: controller.signal,
      });
      if (!res.ok || !res.body) throw new Error('HTTP ' + res.status);

      let doneEvent = null;

      for await (const ev of parseSSE(res)) {
        let data;
        try { data = JSON.parse(ev.data); } catch { continue; }

        if (ev.event === 'route') {
          const path = (data.path || '').toLowerCase();
          ui.badge.className = 'badge ' + (path === 'fast' ? 'fast' : path === 'slow' ? 'slow' : '');
          const modelShort = (data.model || '').replace(/^qwen[\d.]+[:-]?/i, '') || data.model || '';
          ui.badge.textContent = `${path.toUpperCase()} — ${modelShort}`;
          const bits = [];
          if (data.reason) bits.push(data.reason);
          if (data.detail) bits.push(data.detail);
          ui.detail.textContent = bits.length ? ' · ' + bits.join(' · ') : '';
        } else if (ev.event === 'token') {
          if (ttft == null) {
            ttft = performance.now() - t0;
            $waitLabel.textContent = 'streaming…';
          }
          tokCount++;
          ui.body.textContent += (data.text || '');
          scrollBottom();
        } else if (ev.event === 'done') {
          doneEvent = data;
        } else if (ev.event === 'error') {
          throw new Error(data.message || 'stream error');
        }
      }

      const totalMs = performance.now() - t0;
      const finalTtft = doneEvent?.ttft_ms ?? ttft;
      const finalTotal = doneEvent?.total_ms ?? totalMs;
      const finalN = doneEvent?.token_count ?? tokCount;
      const finish = doneEvent?.finish_reason || 'stop';

      ui.metrics.innerHTML =
        `TTFT <b>${fmtMs(finalTtft)}</b>` +
        `<span class="sep">·</span>total <b>${fmtMs(finalTotal)}</b>` +
        `<span class="sep">·</span><b>${finalN}</b> tok` +
        (finish !== 'stop' ? `<span class="sep">·</span>${finish}` : '');
    } catch (err) {
      const aborted = err.name === 'AbortError';
      ui.badge.className = 'badge err';
      ui.badge.textContent = aborted ? 'CANCELLED' : 'ERROR';
      ui.detail.textContent = aborted ? '' : ' · ' + (err.message || String(err));
      const totalMs = performance.now() - t0;
      ui.metrics.innerHTML =
        `TTFT <b>${fmtMs(ttft)}</b>` +
        `<span class="sep">·</span>total <b>${fmtMs(totalMs)}</b>` +
        `<span class="sep">·</span><b>${tokCount}</b> tok`;
    } finally {
      stopWaiting();
      inflight = null;
      $send.disabled = false;
      $input.focus();
    }
  }

  // ---- cancel ----
  $cancel.addEventListener('click', () => {
    if (!inflight) return;
    const { controller, requestId } = inflight;
    controller.abort();
    fetch('/chat/cancel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ request_id: requestId }),
    }).catch(() => { /* fire and forget */ });
  });

  // ---- input handling ----
  $send.addEventListener('click', () => {
    const t = $input.value;
    $input.value = '';
    send(t);
  });
  $input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      $send.click();
    }
  });
  $input.focus();
})();
</script>
</body>
</html>
